<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#FF6B9D" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- black-translucent makes the web view fill the WHOLE screen (incl. the
         status-bar / home-indicator areas); we pad content with the
         safe-area-inset-* values. "default" shrank the layout viewport ~62px
         below the screen, leaving a gap under the bottom tab bar. Rubber-band
         scrolling is prevented by locking html/body (position:fixed) in CSS. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="旅日記" />
    <link rel="apple-touch-icon" href="/icon.jpg" />

    <!-- Icons -->
    <link rel="icon" type="image/jpeg" href="/icon.jpg" />

    <title>旅日記</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
