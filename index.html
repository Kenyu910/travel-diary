<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#FF6B9D" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- black-translucent = immersive: the map fills the whole screen incl.
         under the Dynamic Island. #root is sized with 100vh so the white tab
         bar reaches the very bottom (no gap); tab labels are padded to stay
         above the ~62px bottom band that iOS won't render text into. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="旅日記" />
    <link rel="apple-touch-icon" href="/icon.jpg" />

    <!-- Icons -->
    <link rel="icon" type="image/jpeg" href="/icon.jpg" />

    <title>旅日記</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
