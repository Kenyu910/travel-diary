<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#FF6B9D" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- "default" makes iOS reserve the status-bar / dynamic-island area at the
         OS level, so content never opens tucked underneath it. "black-translucent"
         let content slide under the island when safe-area insets were 0 on launch. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="旅日記" />
    <link rel="apple-touch-icon" href="/icon.jpg" />

    <!-- Icons -->
    <link rel="icon" type="image/jpeg" href="/icon.jpg" />

    <title>旅日記</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
